name: Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Schema + service + idalib smoke
    runs-on: reveng-ida

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dev environment
        run: uv sync

      - name: Build vendor dependencies
        run: |
          mkdir -p reai_toolkit/vendor
          uv pip install . --target reai_toolkit/vendor --no-cache-dir
          rm -rf reai_toolkit/vendor/reai_toolkit
          rm -rf reai_toolkit/vendor/reai_toolkit-*.dist-info
        shell: bash

      # The first open database calls fails, the license-server checkout and IDA _exit()s the process. This throwaway to register the client so the first test case doesn't fail.
      - name: Warm up IDA license
        env:
          IDA_LICENSE: "server:host=${{ secrets.IDA_SERVER_URL }}:port=${{ secrets.IDA_SERVER_PORT }}"
        run: uv run python -c "import idapro; idapro.open_database('tests/fixtures/hello.elf', False); idapro.close_database(False)" || true
        shell: bash

      - name: Run tests
        env:
          IDA_LICENSE: "server:host=${{ secrets.IDA_SERVER_URL }}:port=${{ secrets.IDA_SERVER_PORT }}"
        run: uv run pytest -q
