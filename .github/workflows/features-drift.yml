name: features-drift

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check .revengai/features.json is up to date
        run: python scripts/emit_features.py --check
